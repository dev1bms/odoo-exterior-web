{% extends "base.html" %}
{% block title %}Delete {{ object.name }} · odoo-exterior-web{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Delete instance</h1>
        <p>
          Delete <strong>{{ object.name }}</strong> (<code>{{ object.odoo_url }}</code>)?
          All associated audit runs will also be removed.
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-between">
            <a class="btn btn-outline-secondary" href="{{ object.get_absolute_url }}">Cancel</a>
            <button class="btn btn-danger" type="submit">Yes, delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
